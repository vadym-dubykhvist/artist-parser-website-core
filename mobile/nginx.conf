server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Flutter web routing — redirect all paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
